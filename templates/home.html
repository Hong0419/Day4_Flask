<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Scrapper</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
  </head>
  <body>
    <main class="container">
      <h1>채용공고 검색</h1>
      <h4>어떤 직무를 찾고 계신가요?</h4>
      <form action="/search">
        <input
          type="text"
          name="keyword"
          placeholder="검색어를 입력해주세요 (예: Python, JavaScript)"
        />
        <button>검색하기</button>
      </form>
    </main>
  </body>
</html>
